<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>HOota Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Cairo', sans-serif;
  background:#0b0f1a;
  color:#fff;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  background:#020617;
}
.logo{color:#00cfff;font-weight:800}

/* AUTH */
.container{padding:80px 20px;text-align:center}

.auth-box{
  background:#111827;
  padding:30px;
  border-radius:20px;
  max-width:380px;
  margin:auto;
  animation:fadeIn 0.5s;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
}

.btn{
  background:#00cfff;
  color:#000;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  width:100%;
  transition:0.3s;
}
.btn:hover{transform:scale(1.05)}

.link{
  margin-top:15px;
  color:#00cfff;
  cursor:pointer;
}

/* DASHBOARD */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:15px;
  cursor:pointer;
  transition:0.3s;
}
.card:hover{
  transform:translateY(-5px);
  border:1px solid #00cfff;
}

/* COURSE */
.course{
  max-width:900px;
  margin:auto;
  text-align:right;
  line-height:1.8;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.scroll-btn{
  position:fixed;
  right:20px;
  padding:10px 15px;
  border:none;
  border-radius:50%;
  background:#00cfff;
  cursor:pointer;
}
#topBtn{bottom:80px}
#bottomBtn{bottom:20px}

/* TOAST */
.toast{
  position:fixed;
  top:20px;
  right:20px;
  background:#111;
  border-left:5px solid #00cfff;
  padding:15px;
  border-radius:10px;
  opacity:0;
  transform:translateX(100px);
  transition:0.4s;
}
.toast.show{
  opacity:1;
  transform:translateX(0);
}

.hidden{display:none}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px)}
  to{opacity:1}
}
</style>
</head>

<body>

<nav>
  <div class="logo">HOota Academy</div>
  <div id="navUser" class="hidden">
    <span id="userEmail"></span>
    <button class="btn" onclick="logout()">خروج</button>
  </div>
</nav>

<!-- AUTH -->
<div id="auth" class="container">
<div class="auth-box">

<div id="loginBox">
<h2>تسجيل الدخول</h2>
<input id="logEmail" placeholder="الإيميل">
<input id="logPass" type="password" placeholder="كلمة المرور">
<button class="btn" onclick="login()">دخول</button>
<p class="link" onclick="showRegister()">إنشاء حساب</p>
</div>

<div id="registerBox" class="hidden">
<h2>إنشاء حساب</h2>
<input id="regName" placeholder="الاسم">
<input id="regEmail" placeholder="الإيميل">
<input id="regPass" type="password">
<button class="btn" onclick="register()">إنشاء</button>
<p class="link" onclick="showLogin()">رجوع</p>
</div>

</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="container hidden">
<h2>🎓 الكورسات</h2>

<div class="grid">
<div class="card" onclick="openCourse('html')"><h3>HTML</h3></div>
<div class="card" onclick="openCourse('css')"><h3>CSS</h3></div>
<div class="card" onclick="openCourse('js')"><h3>JavaScript</h3></div>
</div>
</div>

<!-- COURSE -->
<div id="coursePage" class="container hidden">
<div class="course">

<div class="top-bar">
<button class="btn" onclick="back()">⬅ رجوع</button>
<button class="btn" onclick="scrollBottom()">⬇</button>
</div>

<div id="courseContent"></div>

<button class="btn" onclick="back()">⬅ رجوع</button>

</div>
</div>

<button id="topBtn" class="scroll-btn" onclick="scrollTopPage()">⬆</button>
<button id="bottomBtn" class="scroll-btn" onclick="scrollBottom()">⬇</button>

<div id="toast" class="toast"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBsvF9J_DneR5H0JbOW4HX_JjVWaajAUgk",
authDomain: "website-8833c.firebaseapp.com",
projectId: "website-8833c",
storageBucket: "website-8833c.firebasestorage.app",
messagingSenderId: "831801957212",
appId: "1:831801957212:web:707b3c8ac71fb67212bf99"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Toast
function showToast(msg){
const t=document.getElementById("toast");
t.innerText=msg;
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),3000);
}

// Switch
window.showRegister=()=>{
loginBox.classList.add("hidden");
registerBox.classList.remove("hidden");
}
window.showLogin=()=>{
registerBox.classList.add("hidden");
loginBox.classList.remove("hidden");
}

// Register
window.register=async()=>{
try{
await createUserWithEmailAndPassword(auth,regEmail.value,regPass.value);
showToast("تم إنشاء الحساب 🎉");
showLogin();
}catch(e){showToast(e.message)}
}

// Login
window.login=async()=>{
try{
await signInWithEmailAndPassword(auth,logEmail.value,logPass.value);
showToast("جارٍ تسجيل الدخول...");
}catch(e){showToast(e.message)}
}

// Logout
window.logout=()=>signOut(auth);

// Auth State (🔥 FIXED REDIRECT)
onAuthStateChanged(auth,(user)=>{
if(user){
document.getElementById("auth").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");
document.getElementById("navUser").classList.remove("hidden");
document.getElementById("userEmail").innerText=user.email;
}else{
document.getElementById("auth").classList.remove("hidden");
document.getElementById("dashboard").classList.add("hidden");
document.getElementById("navUser").classList.add("hidden");
}
});

// Courses
const htmlCourse="<h2>HTML</h2>"+ "<p>تعلم HTML</p>".repeat(200);
const cssCourse="<h2>CSS</h2>"+ "<p>تعلم CSS</p>".repeat(200);
const jsCourse="<h2>JS</h2>"+ "<p>تعلم JS</p>".repeat(200);

// Open Course
window.openCourse=(t)=>{
if(!auth.currentUser){
showToast("سجل دخول أول 🔒");
return;
}
document.getElementById("dashboard").classList.add("hidden");
document.getElementById("coursePage").classList.remove("hidden");

if(t==="html") courseContent.innerHTML=htmlCourse;
if(t==="css") courseContent.innerHTML=cssCourse;
if(t==="js") courseContent.innerHTML=jsCourse;
}

// Back
window.back=()=>{
document.getElementById("coursePage").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");
}

// Scroll
window.scrollTopPage=()=>window.scrollTo({top:0,behavior:"smooth"});
window.scrollBottom=()=>window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"});

</script>

</body>
</html>
