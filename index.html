<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>HOota Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Cairo', sans-serif;
  background: linear-gradient(180deg,#3b0a6d,#0b0f1a);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#fff;
}

/* stars */
body::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:url("https://www.transparenttextures.com/patterns/stardust.png");
  opacity:0.4;
}

/* LOGO */
.logo{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  font-size:22px;
  font-weight:800;
  background:linear-gradient(90deg,#fff,#00cfff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* AUTH */
.auth-box{
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.2);
  padding:40px;
  border-radius:25px;
  width:350px;
  text-align:center;
}

/* inputs */
input{
  width:100%;
  padding:14px;
  margin:10px 0;
  border:none;
  border-radius:30px;
  background:rgba(255,255,255,0.1);
  color:#fff;
}

/* button */
.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:30px;
  background:#fff;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

.link{
  margin-top:15px;
  cursor:pointer;
}

/* footer */
.footer{
  margin-top:25px;
  font-weight:800;
  font-size:18px;
  line-height:1.5;
}

/* dashboard */
.dashboard{
  display:none;
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:40px;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:15px;
  cursor:pointer;
}

/* course */
.course{
  display:none;
  padding:40px;
  max-width:900px;
  margin:auto;
}

.back-btn{
  border:1px solid #00cfff;
  color:#00cfff;
  padding:10px 20px;
  border-radius:20px;
  cursor:pointer;
}

/* toast */
.toast{
  position:fixed;
  top:20px;
  right:20px;
  background:#111;
  padding:10px 20px;
  border-radius:10px;
  opacity:0;
  transition:0.3s;
}
.toast.show{opacity:1}
</style>
</head>

<body>

<div class="logo">HOota Academy</div>

<!-- AUTH -->
<div id="auth">
<div class="auth-box">

<div id="loginBox">
<h2>Login</h2>
<input id="logEmail" placeholder="Email">
<input id="logPass" type="password" placeholder="Password">
<button class="btn" onclick="login()">Login</button>
<p class="link" onclick="showRegister()">Register</p>
</div>

<div id="registerBox" style="display:none">
<h2>Register</h2>
<input id="regName" placeholder="Name">
<input id="regEmail" placeholder="Email">
<input id="regPass" type="password">
<button class="btn" onclick="register()">Create</button>
<p class="link" onclick="showLogin()">Back</p>
</div>

<div class="footer">
حووته<br>HOota.com
</div>

</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">
<h2>🎓 الكورسات</h2>

<div class="grid">
<div class="card" onclick="openCourse()">HTML</div>
<div class="card" onclick="openCourse()">CSS</div>
<div class="card" onclick="openCourse()">JS</div>
</div>
</div>

<!-- COURSE -->
<div id="course" class="course">
<button class="back-btn" onclick="back()">رجوع</button>
<div id="content"></div>
</div>

<div id="toast" class="toast"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,onAuthStateChanged} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBsvF9J_DneR5H0JbOW4HX_JjVWaajAUgk",
authDomain: "website-8833c.firebaseapp.com",
projectId: "website-8833c",
storageBucket: "website-8833c.firebasestorage.app",
messagingSenderId: "831801957212",
appId: "1:831801957212:web:707b3c8ac71fb67212bf99"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// toast
function toast(msg){
const t=document.getElementById("toast");
t.innerText=msg;
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),2000);
}

// switch
window.showRegister=()=>{loginBox.style.display="none";registerBox.style.display="block";}
window.showLogin=()=>{registerBox.style.display="none";loginBox.style.display="block";}

// register
window.register=async()=>{
try{
await createUserWithEmailAndPassword(auth,regEmail.value,regPass.value);
toast("تم إنشاء الحساب");
showLogin();
}catch(e){toast(e.message)}
}

// login
window.login=async()=>{
try{
await signInWithEmailAndPassword(auth,logEmail.value,logPass.value);
toast("تم تسجيل الدخول");
}catch(e){toast(e.message)}
}

// FIX 🔥
onAuthStateChanged(auth,(user)=>{
const authDiv=document.getElementById("auth");
const dashboard=document.getElementById("dashboard");

if(user){
authDiv.style.display="none";
dashboard.style.display="block";
}else{
authDiv.style.display="block";
dashboard.style.display="none";
}
});

// course
window.openCourse=()=>{
document.getElementById("dashboard").style.display="none";
document.getElementById("course").style.display="block";
content.innerHTML="<h2>كورس</h2>"+"<p>تعلم</p>".repeat(200);
}

window.back=()=>{
document.getElementById("course").style.display="none";
document.getElementById("dashboard").style.display="block";
}

</script>

</body>
</html>
