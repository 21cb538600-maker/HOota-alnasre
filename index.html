<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>HOota Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Cairo', sans-serif;
  background: linear-gradient(180deg,#0f172a,#020617);
  color:#fff;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:#020617;
  border-bottom:1px solid #111;
}

.logo{
  font-weight:900;
  color:#00cfff;
  font-size:20px;
}

/* Logout */
.logout{
  background:#ef4444;
  border:none;
  padding:6px 12px;
  border-radius:8px;
  color:#fff;
  cursor:pointer;
  font-size:13px;
  transition:0.3s;
}

.logout:hover{
  transform:scale(1.05);
  background:#dc2626;
}

/* AUTH */
.center{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  animation:fadeIn 0.6s ease;
}

.box{
  background:#020617;
  padding:35px;
  border-radius:18px;
  width:340px;
  text-align:center;
  border:1px solid #111;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  background:#0f172a;
  color:#fff;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
}

.btn-main{
  background:#00cfff;
  color:#000;
  font-weight:bold;
}

.link{
  cursor:pointer;
  margin-top:12px;
  color:#00cfff;
}

/* DASHBOARD */
.dashboard{
  display:none;
  padding:20px;
}

/* COURSE */
.course{
  display:none;
  padding:20px;
  max-width:900px;
  margin:auto;
}

.back{
  border:1px solid #00cfff;
  color:#00cfff;
  background:transparent;
  padding:8px 18px;
  border-radius:25px;
  cursor:pointer;
  margin-bottom:20px;
}

/* ===== TOAST ===== */
.toast{
  position:fixed;
  top:20px;
  right:20px;
  min-width:220px;
  padding:12px 16px;
  border-radius:12px;
  background:#111827;
  color:#fff;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
  transform:translateY(-20px);
  opacity:0;
  transition:0.4s ease;
  z-index:9999;
  border-right:4px solid #00cfff;
  font-weight:bold;
}

.toast.show{
  transform:translateY(0);
  opacity:1;
}

.toast.success{ border-color:#22c55e; }
.toast.error{ border-color:#ef4444; }
.toast.info{ border-color:#00cfff; }

</style>
</head>

<body>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<nav>
<div class="logo">HOota Academy</div>
<button id="logoutBtn" class="logout">خروج</button>
</nav>

<!-- AUTH -->
<div id="auth" class="center">
<div class="box">

<div id="loginBox">
<h3>Login</h3>
<input id="logEmail" placeholder="Email">
<input id="logPass" type="password" placeholder="Password">
<button class="btn-main" onclick="login()">Login</button>
<p class="link" onclick="showRegister()">إنشاء حساب</p>
</div>

<div id="registerBox" style="display:none">
<h3>Register</h3>
<input id="regEmail" placeholder="Email">
<input id="regPass" type="password" placeholder="Password">
<input id="regPass2" type="password" placeholder="Confirm Password">
<button class="btn-main" onclick="register()">Create</button>
<p class="link" onclick="showLogin()">رجوع</p>
</div>

</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">
<h2>🎓 الكورسات</h2>
</div>

<!-- COURSE -->
<div id="course" class="course">
<button class="back" onclick="back()">⬅ الرجوع</button>
<div id="content"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* 🔥 API KEY (بدون تغيير كما طلبت) */
const app = initializeApp({
apiKey:"AIzaSyBsvF9J_DneR5H0JbOW4HX_JjVWaajAUgk",
authDomain:"website-8833c.firebaseapp.com",
projectId:"website-8833c"
});

const auth = getAuth(app);

const authDiv = document.getElementById("auth");
const dashboard = document.getElementById("dashboard");
const courseDiv = document.getElementById("course");

/* ===== TOAST FUNCTION ===== */
function showToast(msg,type="info"){
const t=document.getElementById("toast");
t.innerText=msg;
t.className="toast show "+type;

setTimeout(()=>{
t.classList.remove("show");
},2500);
}

/* LOGIN */
window.login=async()=>{
try{
await signInWithEmailAndPassword(auth,logEmail.value,logPass.value);
showToast("تم تسجيل الدخول بنجاح","success");
}catch(e){
showToast("خطأ في البيانات","error");
}
}

/* REGISTER */
window.register=async()=>{
if(regPass.value !== regPass2.value){
showToast("كلمة المرور غير متطابقة","error");
return;
}

try{
await createUserWithEmailAndPassword(auth,regEmail.value,regPass.value);
showToast("تم إنشاء الحساب بنجاح","success");
}catch(e){
showToast("فشل إنشاء الحساب","error");
}
}

/* AUTH STATE */
onAuthStateChanged(auth,(user)=>{
if(user){
authDiv.style.display="none";
dashboard.style.display="block";
courseDiv.style.display="none";
showToast("مرحباً "+user.email,"info");
}else{
authDiv.style.display="flex";
dashboard.style.display="none";
courseDiv.style.display="none";
}
});

/* FORM TOGGLE */
window.showRegister=()=>{
loginBox.style.display="none";
registerBox.style.display="block";
}

window.showLogin=()=>{
registerBox.style.display="none";
loginBox.style.display="block";
}

/* COURSE */
window.openCourse=(name)=>{
dashboard.style.display="none";
courseDiv.style.display="block";
content.innerHTML="<h2>"+name+"</h2><p>محتوى الكورس</p>";
}

/* BACK */
window.back=()=>{
courseDiv.style.display="none";
dashboard.style.display="block";
}

/* LOGOUT */
logoutBtn.onclick=async()=>{
await signOut(auth);
showToast("تم تسجيل الخروج","info");
}

</script>

</body>
</html>
