<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>HOota Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Cairo', sans-serif;
background:linear-gradient(180deg,#0f172a,#020617);
color:#fff;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 18px;
background:#020617;
border-bottom:1px solid #111;
}

.logo{
color:#00cfff;
font-weight:900;
}

.logout{
background:#ef4444;
border:none;
padding:6px 12px;
border-radius:8px;
color:#fff;
cursor:pointer;
display:none; /* 🔥 مهم جداً */
}

/* AUTH */
.center{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
width:340px;
padding:30px;
background:#0f172a;
border-radius:15px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:10px;
border:none;
background:#1e293b;
color:#fff;
}

/* BUTTON */
button{
width:100%;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

.btn-main{
background:#00cfff;
color:#000;
font-weight:bold;
}

/* DASHBOARD */
.dashboard{
display:none;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:#0f172a;
border-radius:15px;
padding:15px;
border:1px solid #111;
}

.thumb{
height:120px;
background:linear-gradient(45deg,#00cfff,#6366f1);
border-radius:10px;
}

/* COURSE */
.course{
display:none;
padding:20px;
max-width:900px;
margin:auto;
}

.back{
border:1px solid #00cfff;
color:#00cfff;
background:transparent;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
margin-bottom:15px;
}

/* TOAST */
.toast{
position:fixed;
top:20px;
right:20px;
background:#111827;
padding:10px 14px;
border-radius:10px;
opacity:0;
transition:0.3s;
}

.toast.show{
opacity:1;
}
</style>
</head>

<body>

<div id="toast" class="toast"></div>

<nav>
<div class="logo">HOota Academy</div>
<button id="logoutBtn" class="logout">خروج</button>
</nav>

<!-- AUTH -->
<div id="auth" class="center">
<div class="box">

<div id="loginBox">
<h3>Login</h3>
<input id="logEmail" placeholder="Email">
<input id="logPass" type="password" placeholder="Password">
<button class="btn-main" onclick="login()">Login</button>
<p style="color:#00cfff;cursor:pointer" onclick="showRegister()">إنشاء حساب</p>
</div>

<div id="registerBox" style="display:none">
<h3>Register</h3>
<input id="regEmail">
<input id="regPass" type="password">
<input id="regPass2" type="password">
<button class="btn-main" onclick="register()">Create</button>
<p style="color:#00cfff;cursor:pointer" onclick="showLogin()">رجوع</p>
</div>

</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">

<h2>🎓 الكورسات</h2>

<div class="grid">

<div class="card">
<div class="thumb"></div>
<h3>HTML Course</h3>
<p>تعلم HTML من الصفر</p>
<button onclick="openCourse('HTML')">ابدأ</button>
</div>

<div class="card">
<div class="thumb"></div>
<h3>CSS Course</h3>
<p>تصميم احترافي</p>
<button onclick="openCourse('CSS')">ابدأ</button>
</div>

<div class="card">
<div class="thumb"></div>
<h3>JavaScript</h3>
<p>برمجة تفاعلية</p>
<button onclick="openCourse('JS')">ابدأ</button>
</div>

</div>
</div>

<!-- COURSE -->
<div id="course" class="course">

<button class="back" onclick="back()">⬅ الرجوع للكورسات</button>

<div id="content"></div>

<!-- 🔥 واتساب (رجعته بشكل جميل) -->
<div style="margin-top:30px;text-align:center">
<a href="https://wa.me/249900623733" target="_blank">
<button class="btn-main" style="width:200px">
📞 تواصل واتساب
</button>
</a>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyBsvF9DneR5H0JbOW4HX_JjVWaajAUgk",
authDomain:"website-8833c.firebaseapp.com",
projectId:"website-8833c"
});

const auth = getAuth(app);

const authDiv = document.getElementById("auth");
const dashboard = document.getElementById("dashboard");
const courseDiv = document.getElementById("course");
const logoutBtn = document.getElementById("logoutBtn");
const toast = document.getElementById("toast");

/* TOAST */
function showToast(msg){
toast.innerText=msg;
toast.classList.add("show");
setTimeout(()=>toast.classList.remove("show"),2000);
}

/* LOGIN */
window.login=async()=>{
try{
await signInWithEmailAndPassword(auth,logEmail.value,logPass.value);
showToast("تم تسجيل الدخول");
}catch(e){
showToast("خطأ في البيانات");
}
}

/* REGISTER */
window.register=async()=>{
if(regPass.value !== regPass2.value){
showToast("كلمات المرور غير متطابقة");
return;
}
try{
await createUserWithEmailAndPassword(auth,regEmail.value,regPass.value);
showToast("تم إنشاء الحساب");
}catch(e){
showToast("فشل إنشاء الحساب");
}
}

/* AUTH STATE */
onAuthStateChanged(auth,(user)=>{
if(user){
authDiv.style.display="none";
dashboard.style.display="block";
logoutBtn.style.display="block"; // 🔥 هنا فقط يظهر
}else{
authDiv.style.display="flex";
dashboard.style.display="none";
courseDiv.style.display="none";
logoutBtn.style.display="none";
}
});

/* FORM */
window.showRegister=()=>{
loginBox.style.display="none";
registerBox.style.display="block";
}

window.showLogin=()=>{
registerBox.style.display="none";
loginBox.style.display="block";
}

/* COURSE */
window.openCourse=(name)=>{
dashboard.style.display="none";
courseDiv.style.display="block";
content.innerHTML="<h2>"+name+" Course</h2><p>محتوى الكورس</p>";
}

/* BACK */
window.back=()=>{
courseDiv.style.display="none";
dashboard.style.display="block";
}

/* LOGOUT */
logoutBtn.onclick=async()=>{
await signOut(auth);
showToast("تم تسجيل الخروج");
}

</script>

</body>
</html>
