<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>HOota Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Cairo', sans-serif;
background:#020617;
color:#fff;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:12px 18px;
background:#0a0f1c;
border-bottom:1px solid #111;
}

.logo{
color:#00cfff;
font-weight:900;
}

/* AUTH */
.center{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
width:340px;
padding:30px;
border-radius:18px;
background:#0f172a;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
text-align:center;
animation:fade .4s;
}

/* INPUT STYLE 3D */
.input-group{
position:relative;
margin:10px 0;
}

input{
width:100%;
padding:12px 12px 12px 40px;
border-radius:12px;
border:none;
background:#111c33;
color:#fff;
outline:none;
font-size:14px;
box-shadow:inset 0 0 0 1px #1f2a44;
}

input:focus{
box-shadow:0 0 0 2px #00cfff;
}

/* icons */
.icon{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
opacity:0.7;
}

/* BUTTON */
button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
cursor:pointer;
transition:.3s;
font-weight:bold;
}

button:hover{
transform:scale(1.03);
}

.main-btn{
background:#00cfff;
color:#000;
}

/* LINK */
.link{
color:#00cfff;
cursor:pointer;
margin-top:10px;
}

/* DASHBOARD */
.dashboard{
display:none;
padding:20px;
}

/* TOAST */
.toast{
position:fixed;
top:20px;
right:20px;
background:#111827;
padding:12px 16px;
border-radius:10px;
border:1px solid #1f2937;
opacity:0;
transform:translateY(-10px);
transition:.4s;
z-index:999;
}

.toast.show{
opacity:1;
transform:translateY(0);
}

/* ANIMATION */
@keyframes fade{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div id="toast" class="toast"></div>

<nav>
<div class="logo">HOota Academy</div>
</nav>

<!-- AUTH -->
<div id="auth" class="center">
<div class="box">

<div id="loginBox">
<h3>تسجيل الدخول</h3>

<div class="input-group">
<span class="icon">📧</span>
<input id="logEmail" placeholder="Email">
</div>

<div class="input-group">
<span class="icon">🔑</span>
<input id="logPass" type="password" placeholder="Password">
</div>

<button class="main-btn" onclick="login()">دخول</button>
<p class="link" onclick="toggleForm()">إنشاء حساب</p>
</div>

<div id="registerBox" style="display:none">
<h3>إنشاء حساب</h3>

<div class="input-group">
<span class="icon">📧</span>
<input id="regEmail" placeholder="Email">
</div>

<div class="input-group">
<span class="icon">🔑</span>
<input id="regPass" type="password" placeholder="Password">
</div>

<div class="input-group">
<span class="icon">🔐</span>
<input id="regPass2" type="password" placeholder="Confirm Password">
</div>

<button class="main-btn" onclick="register()">إنشاء الحساب</button>
<p class="link" onclick="toggleForm()">رجوع</p>
</div>

</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">
<h2>🎓 مرحباً بك</h2>
<button onclick="logout()">خروج</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_ID"
});

const auth = getAuth(app);

/* TOAST */
function showToast(msg,color="#00cfff"){
const t=document.getElementById("toast");
t.innerText=msg;
t.style.borderColor=color;
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),2500);
}

/* LOGIN */
window.login=async()=>{
try{
await signInWithEmailAndPassword(auth,logEmail.value,logPass.value);
showToast("تم تسجيل الدخول بنجاح");
}catch(e){
showToast("خطأ في البيانات","red");
}
}

/* REGISTER */
window.register=async()=>{
if(regPass.value!==regPass2.value){
showToast("كلمات المرور غير متطابقة","red");
return;
}
try{
await createUserWithEmailAndPassword(auth,regEmail.value,regPass.value);
showToast("تم إنشاء الحساب بنجاح");
}catch(e){
showToast("فشل إنشاء الحساب","red");
}
}

/* AUTH STATE */
onAuthStateChanged(auth,(user)=>{
if(user){
authDiv.style.display="none";
dashboard.style.display="block";
}else{
authDiv.style.display="flex";
dashboard.style.display="none";
}
});

/* TOGGLE FORM */
window.toggleForm=()=>{
loginBox.style.display=
loginBox.style.display==="none"?"block":"none";

registerBox.style.display=
registerBox.style.display==="none"?"block":"none";
}

/* LOGOUT */
window.logout=()=>signOut(auth);

</script>

</body>
</html>
